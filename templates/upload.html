<!DOCTYPE html>
<html>
<body>

<h2>SecureVault Upload</h2>

<form method="POST" enctype="multipart/form-data">

    <input type="file" name="file">

    <button type="submit">
        Upload
    </button>

</form>

<hr>

<h3>Encrypted Files</h3>

<ul>

{% for file in files %}

<li>
    <a href="/download/{{ file }}">
        {{ file }}
    </a>
</li>

{% endfor %}

</ul>

</body>
</html>
